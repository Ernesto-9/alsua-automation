<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes Fallidos - Panel Alsua</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #1a202c; font-size: 28px; font-weight: 700; }
        .filters {
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #48bb78; color: white; }
        .btn-primary:hover { background: #38a169; }
        .btn-danger { background: #f56565; color: white; }
        .btn-danger:hover { background: #e53e3e; }
        .btn-secondary { background: #4299e1; color: white; }
        .btn-secondary:hover { background: #3182ce; }
        .btn-warning { background: #ed8936; color: white; }
        .btn-warning:hover { background: #dd6b20; }
        .btn-small { padding: 8px 16px; font-size: 14px; }
        .table-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .table-container h2 { color: #1a202c; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th {
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }
        tr:hover { background: #f7fafc; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-pending { background: #fef5e7; color: #d68910; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-error { background: #f8d7da; color: #721c24; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            margin: 20px;
        }
        .modal-content h2 { margin-bottom: 24px; }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .detail-item {
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 8px;
        }
        .detail-item label {
            display: block;
            font-size: 12px;
            color: #718096;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .detail-item div {
            color: #1a202c;
            font-weight: 500;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .alert.success { background: #c6f6d5; color: #22543d; }
        .alert.error { background: #fed7d7; color: #742a2a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Viajes Fallidos</h1>
            <a href="/" class="btn btn-secondary">Volver al Dashboard</a>
        </div>

        <div class="filters">
            <span style="font-weight: 600; color: #4a5568;">Filtrar por estado:</span>
            <button onclick="filterByEstado(null)" class="btn btn-small btn-secondary">Todos</button>
            <button onclick="filterByEstado('pendiente_reproceso')" class="btn btn-small btn-warning">Pendientes</button>
            <button onclick="filterByEstado('reprocesado_exitoso')" class="btn btn-small btn-primary">Exitosos</button>
            <button onclick="filterByEstado('reprocesado_fallido')" class="btn btn-small btn-danger">Fallidos</button>
        </div>

        <div id="alert" class="alert"></div>

        <div class="table-container">
            <h2>Listado de Viajes Fallidos</h2>
            <table id="viajesTable">
                <thead>
                    <tr>
                        <th>Prefactura</th>
                        <th>Fecha Fallo</th>
                        <th>Motivo</th>
                        <th>Determinante</th>
                        <th>Placas</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <h2>Detalle del Viaje</h2>
            <div id="viajeDetail"></div>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
                <button onclick="closeDetailModal()" class="btn btn-secondary">Cerrar</button>
                <button onclick="reprocessCurrentTrip()" class="btn btn-primary">Reprocesar</button>
            </div>
        </div>
    </div>

    <script>
        let currentEstado = null;
        let currentTrip = null;

        function loadViajes() {
            const url = currentEstado
                ? `/api/viajes_fallidos?estado=${currentEstado}`
                : '/api/viajes_fallidos';

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.querySelector('#viajesTable tbody');
                    tbody.innerHTML = '';

                    if (data.viajes.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: #718096;">No hay viajes fallidos</td></tr>';
                        return;
                    }

                    data.viajes.forEach(v => {
                        const fecha = new Date(v.timestamp).toLocaleString();
                        const estado = v.estado || 'pendiente_reproceso';
                        const badgeClass = estado === 'pendiente_reproceso' ? 'badge-pending'
                            : estado === 'reprocesado_exitoso' ? 'badge-success'
                            : 'badge-error';
                        const estadoTexto = estado === 'pendiente_reproceso' ? 'Pendiente'
                            : estado === 'reprocesado_exitoso' ? 'Exitoso'
                            : 'Fallido';

                        const datos = v.datos_viaje || {};
                        const row = `<tr onclick="showDetail('${v.filename}')" style="cursor: pointer;">
                            <td><strong>${datos.prefactura || 'N/A'}</strong></td>
                            <td>${fecha}</td>
                            <td>${v.motivo_fallo || 'N/A'}</td>
                            <td>${datos.clave_determinante || 'N/A'}</td>
                            <td>${datos.placa_tractor || 'N/A'} / ${datos.placa_remolque || 'N/A'}</td>
                            <td><span class="badge ${badgeClass}">${estadoTexto}</span></td>
                            <td onclick="event.stopPropagation();">
                                <button onclick="reprocessTrip('${v.filename}')" class="btn btn-primary btn-small">Reprocesar</button>
                                <button onclick="deleteTrip('${v.filename}')" class="btn btn-danger btn-small">Eliminar</button>
                            </td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                });
        }

        function filterByEstado(estado) {
            currentEstado = estado;
            loadViajes();
        }

        function showDetail(filename) {
            fetch(`/api/viajes_fallidos`)
                .then(r => r.json())
                .then(data => {
                    const trip = data.viajes.find(v => v.filename === filename);
                    if (!trip) return;

                    currentTrip = trip;
                    const datos = trip.datos_viaje || {};
                    const detailHtml = `
                        <div class="detail-grid">
                            <div class="detail-item"><label>Prefactura</label><div>${datos.prefactura || 'N/A'}</div></div>
                            <div class="detail-item"><label>Fecha Viaje</label><div>${datos.fecha || 'N/A'}</div></div>
                            <div class="detail-item"><label>Placa Tractor</label><div>${datos.placa_tractor || 'N/A'}</div></div>
                            <div class="detail-item"><label>Placa Remolque</label><div>${datos.placa_remolque || 'N/A'}</div></div>
                            <div class="detail-item"><label>Determinante</label><div>${datos.clave_determinante || 'N/A'}</div></div>
                            <div class="detail-item"><label>Importe</label><div>${datos.importe || 'N/A'}</div></div>
                            <div class="detail-item"><label>Cliente</label><div>${datos.cliente_codigo || 'N/A'}</div></div>
                            <div class="detail-item"><label>Módulo Error</label><div>${trip.modulo_error || 'N/A'}</div></div>
                        </div>
                        <div class="detail-item" style="grid-column: 1 / -1;">
                            <label>Motivo Fallo</label>
                            <div>${trip.motivo_fallo || 'N/A'}</div>
                        </div>
                    `;
                    document.getElementById('viajeDetail').innerHTML = detailHtml;
                    document.getElementById('detailModal').classList.add('active');
                });
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            currentTrip = null;
        }

        function reprocessCurrentTrip() {
            if (currentTrip) {
                reprocessTrip(currentTrip.filename);
                closeDetailModal();
            }
        }

        function reprocessTrip(filename) {
            if (!confirm('¿Reprocesar este viaje?')) return;

            fetch('/api/viajes_fallidos/reprocess', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename})
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    showAlert('Viaje agregado a cola para reprocesar', 'success');
                    loadViajes();
                } else {
                    showAlert('Error: ' + result.error, 'error');
                }
            });
        }

        function deleteTrip(filename) {
            if (!confirm('¿Eliminar este viaje fallido?')) return;

            fetch('/api/viajes_fallidos/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename})
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    showAlert('Viaje eliminado', 'success');
                    loadViajes();
                } else {
                    showAlert('Error: ' + result.error, 'error');
                }
            });
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 3000);
        }

        loadViajes();
        setInterval(loadViajes, 15000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Determinantes - Panel Alsua</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #1a202c; font-size: 28px; font-weight: 700; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #48bb78; color: white; }
        .btn-primary:hover { background: #38a169; }
        .btn-danger { background: #f56565; color: white; }
        .btn-danger:hover { background: #e53e3e; }
        .btn-secondary { background: #4299e1; color: white; }
        .btn-secondary:hover { background: #3182ce; }
        .table-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .table-container h2 { color: #1a202c; margin-bottom: 16px; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }
        tr:hover { background: #f7fafc; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h2 { margin-bottom: 24px; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-small { padding: 8px 16px; font-size: 14px; }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .alert.success { background: #c6f6d5; color: #22543d; }
        .alert.error { background: #fed7d7; color: #742a2a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gestión de Determinantes</h1>
            <div>
                <a href="/" class="btn btn-secondary">Volver al Dashboard</a>
                <button onclick="openAddModal()" class="btn btn-primary">Agregar Determinante</button>
            </div>
        </div>

        <div id="alert" class="alert"></div>

        <div class="table-container">
            <h2>Determinantes Configuradas</h2>
            <table id="determinantesTable">
                <thead>
                    <tr>
                        <th>Determinante</th>
                        <th>Ruta GM</th>
                        <th>Base Origen</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2>Agregar Determinante</h2>
            <div class="form-group">
                <label>Determinante:</label>
                <input type="text" id="determinante" placeholder="ej: 1234">
            </div>
            <div class="form-group">
                <label>Ruta GM:</label>
                <input type="text" id="ruta_gm" placeholder="ej: CDMX-GDL">
            </div>
            <div class="form-group">
                <label>Base Origen:</label>
                <input type="text" id="base_origen" placeholder="ej: CDMX">
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button onclick="closeAddModal()" class="btn btn-secondary">Cancelar</button>
                <button onclick="addDeterminante()" class="btn btn-primary">Agregar</button>
            </div>
        </div>
    </div>

    <script>
        function loadDeterminantes() {
            fetch('/api/determinantes')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.querySelector('#determinantesTable tbody');
                    tbody.innerHTML = '';
                    data.determinantes.forEach(d => {
                        const row = `<tr>
                            <td>${d.determinante}</td>
                            <td>${d.ruta_gm}</td>
                            <td>${d.base_origen}</td>
                            <td>
                                <button onclick="deleteDeterminante('${d.determinante}')" class="btn btn-danger btn-small">Eliminar</button>
                            </td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                });
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('determinante').value = '';
            document.getElementById('ruta_gm').value = '';
            document.getElementById('base_origen').value = '';
        }

        function addDeterminante() {
            const data = {
                determinante: document.getElementById('determinante').value,
                ruta_gm: document.getElementById('ruta_gm').value,
                base_origen: document.getElementById('base_origen').value
            };

            fetch('/api/determinantes/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    showAlert('Determinante agregada correctamente', 'success');
                    closeAddModal();
                    loadDeterminantes();
                } else {
                    showAlert('Error: ' + result.error, 'error');
                }
            });
        }

        function deleteDeterminante(determinante) {
            if (!confirm('¿Eliminar determinante ' + determinante + '?')) return;

            fetch('/api/determinantes/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({determinante})
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    showAlert('Determinante eliminada', 'success');
                    loadDeterminantes();
                } else {
                    showAlert('Error: ' + result.error, 'error');
                }
            });
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 3000);
        }

        loadDeterminantes();
        setInterval(loadDeterminantes, 10000);
    </script>
</body>
</html>
